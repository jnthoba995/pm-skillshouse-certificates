<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM SkillsHouse Certificates</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      background: #ffffff;
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #1f2937;
    }

    p {
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #4f46e5;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 14px;
      color: #374151;
    }

    .note {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PM SkillsHouse</h1>
    <p>Generate your certificate instantly</p>

    <input id="fullName" type="text" placeholder="Full Name" />
    <input id="idNumber" type="text" placeholder="ID Number" />
    <input id="certificateDate" type="text" placeholder="Date (e.g. 19-04-2026)" />

    <button id="generateBtn" type="button">Generate Certificate PDF</button>

    <div id="statusText" class="status"></div>
    <div class="note">Using the uploaded Mind My Money certificate template</div>
  </div>

  <script>
    async function generateCertificate() {
      const statusText = document.getElementById("statusText");
      const generateBtn = document.getElementById("generateBtn");

      const fullName = document.getElementById("fullName").value.trim();
      const idNumber = document.getElementById("idNumber").value.trim();
      const certificateDate = document.getElementById("certificateDate").value.trim();

      if (!fullName || !idNumber || !certificateDate) {
        statusText.textContent = "Please complete all fields.";
        return;
      }

      try {
        generateBtn.disabled = true;
        statusText.textContent = "Generating certificate...";

        const existingPdfBytes = await fetch("Mind%20My%20Money%20Certificate%20final%20copy%202%20(1).pdf").then(function (res) {
          if (!res.ok) {
            throw new Error("Certificate template could not be loaded.");
          }
          return res.arrayBuffer();
        });

        const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
        const page = pdfDoc.getPages()[0];

        const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
        const boldFont = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
        const textColor = PDFLib.rgb(0.2, 0.2, 0.2);
        const nameColor = PDFLib.rgb(0.1, 0.1, 0.1);

        const pageWidth = page.getWidth();
        const pageHeight = page.getHeight();

        const nameSize = 24;
        const idSize = 20;
        const dateSize = 16;

        const nameWidth = boldFont.widthOfTextAtSize(fullName, nameSize);
        const idWidth = font.widthOfTextAtSize(idNumber, idSize);
        const dateWidth = font.widthOfTextAtSize(certificateDate, dateSize);

        const nameX = (pageWidth - nameWidth) / 2;
        const idX = (pageWidth - idWidth) / 2;
        const dateX = (pageWidth - dateWidth) / 2;

        page.drawText(fullName, {
          x: nameX,
          y: pageHeight * 0.515,
          size: nameSize,
          font: boldFont,
          color: nameColor
        });

        page.drawText(idNumber, {
          x: idX,
          y: pageHeight * 0.41,
          size: idSize,
          font: font,
          color: textColor
        });

       // DATE (right aligned under "Date" label)
const rightMargin = 120; // tweak this if needed

const dateWidth = font.widthOfTextAtSize(certificateDate, dateSize);
const dateX = pageWidth - dateWidth - rightMargin;

page.drawText(certificateDate, {
  x: dateX,
  y: pageHeight * 0.245,
  size: dateSize,
  font: font,
  color: textColor
});

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = fullName + " - Certificate.pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        URL.revokeObjectURL(url);
        statusText.textContent = "Certificate generated successfully.";
      } catch (error) {
        console.error(error);
        statusText.textContent = "Something went wrong while generating the certificate.";
      } finally {
        generateBtn.disabled = false;
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateCertificate);
  </script>
</body>
</html>
