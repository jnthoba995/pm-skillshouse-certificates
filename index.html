<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM SkillsHouse Certificates</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      color: #1f2937;
      text-align: center;
    }

    p {
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 16px;
      line-height: 1.5;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: #4f46e5;
    }

    .file-wrap {
      margin-bottom: 14px;
    }

    .file-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #374151;
      font-weight: 600;
    }

    input[type="file"] {
      padding: 12px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .btn-secondary:hover {
      background: #e0e7ff;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 14px;
      color: #374151;
      white-space: pre-line;
      text-align: center;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }

    .hint, .preview-box {
      margin-top: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      color: #4b5563;
      line-height: 1.6;
    }

    .hint strong, .preview-box strong {
      color: #111827;
    }

    .preview-box {
      display: none;
    }

    .preview-list {
      margin-top: 8px;
      padding-left: 18px;
    }

    .preview-list li {
      margin-bottom: 4px;
    }

    @media (max-width: 640px) {
      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PM SkillsHouse</h1>
    <p>Upload your Excel file, preview one certificate, then generate the final merged PDF.</p>

    <div class="file-wrap">
      <label class="file-label" for="excelFile">Excel file</label>
      <input id="excelFile" type="file" accept=".xlsx,.xls" />
    </div>

    <input id="certificateDate" type="text" placeholder="Certificate Date (e.g. 19-04-2026)" />

    <div class="buttons">
      <button id="previewBtn" class="btn-secondary" type="button">Preview First Certificate</button>
      <button id="generateBtn" class="btn-primary" type="button">Generate Bulk PDF</button>
    </div>

    <div id="statusText" class="status"></div>

    <div id="previewBox" class="preview-box">
      <strong>Preview summary</strong>
      <div id="previewCount" style="margin-top:8px;"></div>
      <ol id="previewList" class="preview-list"></ol>
    </div>

    <div class="hint">
      <strong>Expected Excel headings:</strong><br />
      Full Name<br />
      ID Number
    </div>

    <div class="note">Using the uploaded Mind My Money certificate template</div>
  </div>

  <script>
    async function readExcelRows() {
      const excelFileInput = document.getElementById("excelFile");
      const certificateDate = document.getElementById("certificateDate").value.trim();

      if (!excelFileInput.files || !excelFileInput.files[0]) {
        throw new Error("Please upload an Excel file.");
      }

      if (!certificateDate) {
        throw new Error("Please enter the certificate date.");
      }

      const excelBuffer = await excelFileInput.files[0].arrayBuffer();
      const workbook = XLSX.read(excelBuffer, { type: "array" });
      const firstSheetName = workbook.SheetNames[0];
      const worksheet = workbook.Sheets[firstSheetName];
      const rows = XLSX.utils.sheet_to_json(worksheet, { defval: "" });

      if (!rows.length) {
        throw new Error("The Excel file has no data rows.");
      }

      const cleanedRows = rows
        .map(function (row) {
          return {
            fullName: String(row["Full Name"] || "").trim(),
            idNumber: String(row["ID Number"] || "").trim()
          };
        })
        .filter(function (row) {
          return row.fullName && row.idNumber;
        });

      if (!cleanedRows.length) {
        throw new Error("No valid rows found. Please use headings exactly: Full Name, ID Number");
      }

      const uniqueMap = new Map();
      cleanedRows.forEach(function (row) {
        const key = row.fullName + "||" + row.idNumber;
        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, row);
        }
      });

      const uniqueRows = Array.from(uniqueMap.values());

      return {
        rows: uniqueRows,
        certificateDate: certificateDate
      };
    }

    async function loadTemplateBytes() {
      const response = await fetch("Mind%20My%20Money%20Certificate%20final%20copy%202%20(1).pdf");
      if (!response.ok) {
        throw new Error("Certificate template could not be loaded.");
      }
      return await response.arrayBuffer();
    }

    async function buildSingleCertificatePdf(templateBytes, fullName, idNumber, certificateDate) {
      const pdfDoc = await PDFLib.PDFDocument.load(templateBytes);
      const page = pdfDoc.getPages()[0];

      const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
      const boldFont = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
      const textColor = PDFLib.rgb(0.2, 0.2, 0.2);
      const nameColor = PDFLib.rgb(0.1, 0.1, 0.1);

      const pageWidth = page.getWidth();
      const pageHeight = page.getHeight();

      const nameSize = 24;
      const idSize = 20;
      const dateSize = 16;

      const nameWidth = boldFont.widthOfTextAtSize(fullName, nameSize);
      const idWidth = font.widthOfTextAtSize(idNumber, idSize);
      const dateWidth = font.widthOfTextAtSize(certificateDate, dateSize);

      const nameX = (pageWidth - nameWidth) / 2;
      const idX = (pageWidth - idWidth) / 2;
      const rightMargin = 120;
      const dateX = pageWidth - dateWidth - rightMargin;

      page.drawText(fullName, {
        x: nameX,
        y: pageHeight * 0.515,
        size: nameSize,
        font: boldFont,
        color: nameColor
      });

      page.drawText(idNumber, {
        x: idX,
        y: pageHeight * 0.41,
        size: idSize,
        font: font,
        color: textColor
      });

      page.drawText(certificateDate, {
        x: dateX,
        y: pageHeight * 0.245,
        size: dateSize,
        font: font,
        color: textColor
      });

      return pdfDoc;
    }

    function showPreviewSummary(rows) {
      const previewBox = document.getElementById("previewBox");
      const previewCount = document.getElementById("previewCount");
      const previewList = document.getElementById("previewList");

      previewCount.textContent = "Valid unique records found: " + rows.length;
      previewList.innerHTML = "";

      rows.slice(0, 5).forEach(function (row) {
        const li = document.createElement("li");
        li.textContent = row.fullName + " — " + row.idNumber;
        previewList.appendChild(li);
      });

      previewBox.style.display = "block";
    }

    async function previewFirstCertificate() {
      const statusText = document.getElementById("statusText");
      const previewBtn = document.getElementById("previewBtn");
      const generateBtn = document.getElementById("generateBtn");

      try {
        previewBtn.disabled = true;
        generateBtn.disabled = true;
        statusText.textContent = "Preparing preview...";

        const result = await readExcelRows();
        showPreviewSummary(result.rows);

        const firstRow = result.rows[0];
        const templateBytes = await loadTemplateBytes();
        const previewPdf = await buildSingleCertificatePdf(
          templateBytes,
          firstRow.fullName,
          firstRow.idNumber,
          result.certificateDate
        );

        const previewBytes = await previewPdf.save();
        const blob = new Blob([previewBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        window.open(url, "_blank");
        statusText.textContent = "Preview opened for the first certificate.";
      } catch (error) {
        console.error(error);
        statusText.textContent = error.message || "Something went wrong while preparing the preview.";
      } finally {
        previewBtn.disabled = false;
        generateBtn.disabled = false;
      }
    }

    async function generateBulkCertificates() {
      const statusText = document.getElementById("statusText");
      const previewBtn = document.getElementById("previewBtn");
      const generateBtn = document.getElementById("generateBtn");

      try {
        previewBtn.disabled = true;
        generateBtn.disabled = true;
        statusText.textContent = "Reading Excel file...";

        const result = await readExcelRows();
        showPreviewSummary(result.rows);

        const templateBytes = await loadTemplateBytes();
        const mergedPdf = await PDFLib.PDFDocument.create();

        statusText.textContent = "Generating " + result.rows.length + " certificate(s)...";

        for (let i = 0; i < result.rows.length; i++) {
          const row = result.rows[i];

          const singlePdf = await buildSingleCertificatePdf(
            templateBytes,
            row.fullName,
            row.idNumber,
            result.certificateDate
          );

          const copiedPages = await mergedPdf.copyPages(singlePdf, [0]);
          mergedPdf.addPage(copiedPages[0]);

          statusText.textContent =
            "Generating " + result.rows.length + " certificate(s)...\nCompleted: " +
            (i + 1) + " of " + result.rows.length;
        }

        const mergedPdfBytes = await mergedPdf.save();
        const blob = new Blob([mergedPdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "PM SkillsHouse Certificates.pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        URL.revokeObjectURL(url);
        statusText.textContent = "Done. " + result.rows.length + " certificate(s) generated successfully.";
      } catch (error) {
        console.error(error);
        statusText.textContent = error.message || "Something went wrong while generating the bulk PDF.";
      } finally {
        previewBtn.disabled = false;
        generateBtn.disabled = false;
      }
    }

    document.getElementById("previewBtn").addEventListener("click", previewFirstCertificate);
    document.getElementById("generateBtn").addEventListener("click", generateBulkCertificates);
  </script>
</body>
</html>
