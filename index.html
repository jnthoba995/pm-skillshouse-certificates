<!DOCTYPE html>
<html>
<head>
  <title>PM SkillsHouse Certificates</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      width: 400px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #4F46E5;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>PM SkillsHouse</h1>
    <p>Generate your certificate instantly</p>

    <input type="text" placeholder="Enter your name">
    <input type="text" placeholder="Course name">

    <button>Generate Certificate</button>
  </div>

</body>
</html>
