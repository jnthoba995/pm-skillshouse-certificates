<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM SkillsHouse Certificates</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      width: 100%;
      max-width: 460px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
    }

    p {
      color: #666;
      margin-bottom: 24px;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #4F46E5;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 10px;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    button:hover {
      background: #4338ca;
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #777;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #333;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PM SkillsHouse</h1>
    <p>Generate your certificate instantly</p>

    <input id="fullName" type="text" placeholder="Full name" />
    <input id="idNumber" type="text" placeholder="ID number" />
    <input id="certificateDate" type="text" placeholder="Date (e.g. 19 April 2026)" />

    <button id="generateBtn">Generate Certificate PDF</button>

    <div class="status" id="statusText"></div>
    <div class="note">This version uses your uploaded Mind My Money certificate template.</div>
  </div>

  <script>
    const { PDFDocument, StandardFonts, rgb } = PDFLib;

    async function generateCertificate() {
      const fullName = document.getElementById("fullName").value.trim();
      const idNumber = document.getElementById("idNumber").value.trim();
      const certificateDate = document.getElementById("certificateDate").value.trim();
      const statusText = document.getElementById("statusText");

      if (!fullName || !idNumber || !certificateDate) {
        statusText.textContent = "Please complete all fields.";
        return;
      }

      try {
        statusText.textContent = "Generating certificate...";

        const existingPdfBytes = await fetch("Mind%20My%20Money%20Certificate%20final%20copy%202%20(1).pdf").then(res => res.arrayBuffer());
        const pdfDoc = await PDFDocument.load(existingPdfBytes);
        const page = pdfDoc.getPages()[0];

        const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
        const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

        const pageWidth = page.getWidth();
        const pageHeight = page.getHeight();

        const nameSize = 28;
        const idSize = 16;
        const dateSize = 16;

        const nameWidth = boldFont.widthOfTextAtSize(fullName, nameSize);
        const idWidth = font.widthOfTextAtSize(idNumber, idSize);

        const nameX = (pageWidth - nameWidth) / 2;
        const idX = (pageWidth - idWidth) / 2;

       // NAME (centered nicely)
page.drawText(fullName, {
  x: nameX,
  y: pageHeight * 0.52,
  size: 30,
  font: boldFont,
  color: rgb(0.1, 0.1, 0.1),
});

// ID NUMBER (slightly lower)
page.drawText(idNumber, {
  x: idX,
  y: pageHeight * 0.42,
  size: 16,
  font: font,
  color: rgb(0.2, 0.2, 0.2),
});

// DATE (right side, aligned with "Date" label)
page.drawText(certificateDate, {
  x: pageWidth * 0.62,
  y: pageHeight * 0.235,
  size: 16,
  font: font,
  color: rgb(0.2, 0.2, 0.2),
});
        
        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `${fullName} - Certificate.pdf`;
        a.click();

        URL.revokeObjectURL(url);
        statusText.textContent = "Certificate generated successfully.";
      } catch (error) {
        console.error(error);
        statusText.textContent = "Something went wrong while generating the certificate.";
      }
    }

    document.getElementById("generateBtn").addEventListener("click", generateCertificate);
  </script>
</body>
</html>
