<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Skillshouse OCR Lab</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --accent: #f97316;
      --accent-soft: #fff7ed;
      --accent-border: #fdba74;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width:100%;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 46px;
      line-height: 1.05;
      color: #1f2937;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #1f2937;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 16px;
    }

    .tag {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      color: #9a3412;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .mini {
      padding: 18px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fafafa;
    }

    .mini strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      color: #111827;
    }

    .upload-box {
      border: 2px dashed var(--accent-border);
      background: var(--accent-soft);
      border-radius: 16px;
      padding: 22px;
    }

    .upload-box input[type="file"] {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 14px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      color: #374151;
      border: 1px solid var(--border);
    }

    .status-box {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      color: #374151;
      font-size: 15px;
      line-height: 1.6;
    }

    .draft-table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th, td {
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-weight: 700;
    }

    td input, td select {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      background: #fff;
    }

    .muted-note {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
    }

    .warning-box {
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #92400e;
      border-radius: 14px;
      padding: 16px 18px;
      margin-top: 18px;
      line-height: 1.6;
      font-size: 14px;
    }

    .preview-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      z-index: 9999;
      padding: 20px;
      align-items: center;
      justify-content: center;
    }

    .preview-modal-card {
      width: min(1200px, 100%);
      height: min(88vh, 900px);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.22);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
      flex: 0 0 auto;
    }

    .preview-modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .preview-modal-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      background: #f9fafb;
      padding: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .preview-frame {
      width: 100%;
      height: 100%;
      min-height: 700px;
      border: none;
      background: #fff;
      border-radius: 12px;
    }

    .preview-image-wrap {
      min-width: max-content;
      min-height: 100%;
    }

    .preview-image {
      display: block;
      max-width: none;
      height: auto;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 6px 22px rgba(15, 23, 42, 0.08);
    }

    

    

    

    

    

    

    

    

    @media (max-width: 900px) {
      

      
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 36px;
      }
    }
  
    .draft-table tbody tr.confidence-high {
      background: #ffffff;
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .draft-table tbody tr.confidence-medium {
  background: rgba(245, 158, 11, 0.10);
  border-left: 4px solid #f59e0b;
}
      background: rgba(245, 158, 11, 0.08);
      box-shadow: inset 3px 0 0 rgba(245, 158, 11, 0.45);
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .draft-table tbody tr.confidence-low {
  background: rgba(239, 68, 68, 0.12);
  border-left: 4px solid #ef4444;
}
      background: rgba(239, 68, 68, 0.10);
      box-shadow: inset 3px 0 0 rgba(239, 68, 68, 0.60);
      transition: background 0.18s ease, box-shadow 0.18s ease;
    }

    .draft-table tbody tr.confidence-medium:hover {
      background: rgba(245, 158, 11, 0.12);
    }

    .draft-table tbody tr.confidence-low:hover {
      background: rgba(239, 68, 68, 0.14);
    }

    .draft-table tbody tr.confidence-medium td.confidence-cell {
      font-weight: 600;
      color: #92400e;
    }

    .draft-table tbody tr.confidence-low td.confidence-cell {
      font-weight: 600;
      color: #991b1b;
    }


    .draft-table tbody tr.confidence-low {
  background: rgba(239, 68, 68, 0.12);
  border-left: 4px solid #ef4444;
}
      background: rgba(239, 68, 68, 0.10);
      box-shadow: inset 3px 0 0 rgba(239, 68, 68, 0.60), 0 0 0 1px rgba(239, 68, 68, 0.15);
      position: relative;
    }

    .confidence-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.12);
      color: #991b1b;
      font-weight: 600;
    }


    .lab-hidden {
      display: none;
    }

    .lab-toggle-btn {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      background: #111827;
      color: #ffffff;
      cursor: pointer;
    }

    .workspace-expanded {
      max-width:100%;
      width: 95%;
    }

    


#reviewTable tbody tr:hover {
  background:#f9fafb;
}
#reviewTable input:focus {
  outline:none;
  border:1px solid #6366f1;
  box-shadow:0 0 0 2px rgba(99,102,241,0.15);
}

#reviewTable tbody tr:focus-within {
  background:#eef2ff;
}

.ocr-review-card {
  padding: 16px;
}
#reviewTable th {
  background: #f9fafb;
  font-size: 13px;
  font-weight: 700;
  color: #374151;
  white-space: nowrap;
}
#reviewTable td {
  vertical-align: top;
}
#reviewTable input,
#reviewTable select {
  background: #ffffff;
  min-height: 42px;
  box-sizing: border-box;
}

.wrap {
  max-width: 96vw !important;
  width: 96vw !important;
}
.ocr-review-card {
  width: 100%;
  max-width: 100%;
}
.ocr-review-card h2 {
  margin-top: 0;
}
</style>




</head>
<body>
  <div class="wrap">
    <div class="card" style="text-align:center;">
      <img src="https://pmskillshouse.skillsbasedhub.co.za/logo.png" alt="PM Skillshouse Logo" style="height:70px; margin-bottom:8px;" />
      

    <div class="card ocr-review-card">
      
      <div class="upload-box">
        

        <div style="margin-top:18px;">
          <label style="font-weight:700; font-size:14px; color:#374151;">
            Register Type
          </label>
          <select id="registerType" style="width:100%; margin-top:8px; padding:12px; border:1px solid #d1d5db; border-radius:12px; width:100%;">
            <option value="auto">Auto detect</option>
            <option value="liberty">Liberty Mind My Money Register</option>
            <option value="sanlam">Sanlam / Stokvel Register</option>
            <option value="template">Blank / Template Reference</option>
          </select>
        </div>

        <input id="ocrFile" type="file" accept=".pdf,image/*" />
        <div class="actions">
          <button id="analyzeBtn" class="btn-primary" type="button">Start OCR Analysis</button>
          <button id="previewScanBtn" class="btn-secondary" type="button">Preview Scan</button>
          <button id="exportDraftBtn" class="btn-secondary" type="button">Export Draft to Excel</button>
          <button id="resetBtn" class="btn-secondary" type="button">Reset Lab</button>
        </div>
        <div id="ocrStatus" class="status-box">Waiting for a scanned file.</div>
        
      </div>
    </div>
    </div>

    <div class="card">
      

<div style="margin-top:8px;">
<div id="inlinePreview" style="height:38vh; border:1px solid #e5e7eb; border-radius:12px; overflow:auto; margin-bottom:8px; background:#fff;"></div>
<h2 style="margin-bottom:8px;">Captured Data Review</h2>

<div style="margin-top:12px; width:100%;">
  <div style="overflow:auto; height:52vh; border:1px solid #e5e7eb; border-radius:12px; width:100%; background:#fff;">
    <table id="reviewTable" style="width:100%; min-width:2200px; table-layout:fixed; border-collapse:collapse;">
      <thead style="background:#f9fafb; position:sticky; top:0; z-index:2;">
        <tr style="border-bottom:1px solid #e5e7eb;">
          <th style="width:60px; text-align:center; padding:12px;">#</th>
          <th style="width:90px; text-align:left; padding:12px;">Row</th>
          <th style="width:220px; text-align:left; padding:12px;">Name</th>
          <th style="width:220px; text-align:left; padding:12px;">Surname</th>
          <th style="width:220px; text-align:left; padding:12px;">ID Number / DOB</th>
          <th style="width:200px; text-align:left; padding:12px;">Contact Number</th>
          <th style="width:240px; text-align:left; padding:12px;">Email Address</th>
          <th style="width:150px; text-align:left; padding:12px;">Gender</th>
          <th style="width:170px; text-align:left; padding:12px;">Employment</th>
          <th style="width:180px; text-align:left; padding:12px;">Credit Report</th>
          <th style="width:210px; text-align:left; padding:12px;">Financial Advice</th>
          <th style="width:160px; text-align:left; padding:12px;">Confidence</th>
          <th style="width:170px; text-align:left; padding:12px;">Review Status</th>
        </tr>
      </thead>
      <tbody id="reviewTableBody"></tbody>
    </table>
  </div>
</div>

        </div>
      </div>
    </div>
  </div>

  <script>
    const ocrFile = document.getElementById("ocrFile");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const previewScanBtn = document.getElementById("previewScanBtn");
    const exportDraftBtn = document.getElementById("exportDraftBtn");
    const resetBtn = document.getElementById("resetBtn");
    const ocrStatus = document.getElementById("ocrStatus");
    const draftTableBody = document.getElementById("draftTableBody");
    const reviewTableBody = document.getElementById("reviewTableBody");
    const registerTypeSelect = document.getElementById("registerType");
    const inlinePreview = document.getElementById("inlinePreview");

    function buildDraftRow(row, index) {
      const confidence = (row.confidence || "high").toLowerCase();
      const confidenceClass = confidence === "low" ? "confidence-low" : confidence === "medium" ? "confidence-medium" : "confidence-high";
      const reviewStatus = row.reviewStatus || (confidence === "low" ? "Needs review" : "Draft");
      return `
        <tr class="${confidenceClass}" style="border-bottom:1px solid #f1f5f9;">
          <td style="text-align:center; font-size:12px; color:#6b7280; padding:10px;">${index + 1}</td>
          <td style="padding:10px;"><input style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;" value="${row.row || ""}" placeholder="Row" /></td>
          <td style="padding:10px;"><input style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;" value="${row.name || ""}" placeholder="Name" /></td>
          <td style="padding:10px;"><input style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;" value="${row.surname || ""}" placeholder="Surname" /></td>
          <td style="padding:10px;"><input style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;" value="${row.idNumber || ""}" placeholder="ID number or DOB" /></td>
          <td style="padding:10px;"><input style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;" value="${row.contact || ""}" placeholder="Contact number" /></td>
          <td style="padding:10px;"><input style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;" value="${row.email || ""}" placeholder="Email address" /></td>
          <td style="padding:10px;">
            <select style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;">
              <option value="" ${!row.gender ? "selected" : ""}>Unknown</option>
              <option value="Male" ${row.gender === "Male" ? "selected" : ""}>Male</option>
              <option value="Female" ${row.gender === "Female" ? "selected" : ""}>Female</option>
            </select>
          </td>
          <td style="padding:10px;">
            <select style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;">
              <option value="" ${!row.employment ? "selected" : ""}>Unknown</option>
              <option value="Employed" ${row.employment === "Employed" ? "selected" : ""}>Employed</option>
              <option value="Unemployed" ${row.employment === "Unemployed" ? "selected" : ""}>Unemployed</option>
            </select>
          </td>
          <td style="padding:10px;">
            <select style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;">
              <option value="" ${!row.creditReport ? "selected" : ""}>Unknown</option>
              <option value="Yes" ${row.creditReport === "Yes" ? "selected" : ""}>Yes</option>
              <option value="No" ${row.creditReport === "No" ? "selected" : ""}>No</option>
            </select>
          </td>
          <td style="padding:10px;">
            <select style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;">
              <option value="" ${!row.financialAdvice ? "selected" : ""}>Unknown</option>
              <option value="Yes" ${row.financialAdvice === "Yes" ? "selected" : ""}>Yes</option>
              <option value="No" ${row.financialAdvice === "No" ? "selected" : ""}>No</option>
            </select>
          </td>
          <td style="padding:10px;">
            <select style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;">
              <option value="high" ${confidence === "high" ? "selected" : ""}>High</option>
              <option value="medium" ${confidence === "medium" ? "selected" : ""}>Medium</option>
              <option value="low" ${confidence === "low" ? "selected" : ""}>Low</option>
            </select>
          </td>
          <td style="padding:10px;">
            <select style="width:100%; padding:10px; font-size:14px; border:1px solid #d1d5db; border-radius:8px;">
              <option value="Draft" ${reviewStatus === "Draft" ? "selected" : ""}>Draft</option>
              <option value="Needs review" ${reviewStatus === "Needs review" ? "selected" : ""}>Needs review</option>
              <option value="Reviewed" ${reviewStatus === "Reviewed" ? "selected" : ""}>Reviewed</option>
            </select>
          </td>
        </tr>
      `;
    }

    function renderSimulatedRows(registerType) {
      const rows = registerType === "sanlam"
        ? [
            { row: "1", name: "Nomsa", surname: "Dlamini", idNumber: "9001010586088", contact: "0824567890", email: "nomsa@example.com", gender: "Female", employment: "Employed", creditReport: "Yes", financialAdvice: "Yes", confidence: "high", reviewStatus: "Draft" },
            { row: "2", name: "Thabo", surname: "Mokoena", idNumber: "8702125432081", contact: "0731234567", email: "", gender: "Male", employment: "Unemployed", creditReport: "No", financialAdvice: "Yes", confidence: "medium", reviewStatus: "Needs review" },
            { row: "3", name: "Lerato", surname: "Nkosi", idNumber: "", contact: "0719981122", email: "lerato@example.com", gender: "Female", employment: "", creditReport: "Yes", financialAdvice: "No", confidence: "low", reviewStatus: "Needs review" }
          ]
        : [
            { row: "1", name: "Sipho", surname: "Zulu", idNumber: "9102245185084", contact: "0812345678", email: "sipho@example.com", gender: "Male", employment: "Employed", creditReport: "Yes", financialAdvice: "No", confidence: "high", reviewStatus: "Draft" },
            { row: "2", name: "Ayanda", surname: "Khumalo", idNumber: "", contact: "0763456789", email: "", gender: "Female", employment: "Employed", creditReport: "No", financialAdvice: "Yes", confidence: "medium", reviewStatus: "Needs review" },
            { row: "3", name: "", surname: "Mabena", idNumber: "8609091122080", contact: "", email: "mabena@example.com", gender: "", employment: "Unemployed", creditReport: "", financialAdvice: "Yes", confidence: "low", reviewStatus: "Needs review" }
          ];

      if (reviewTableBody) {
        reviewTableBody.innerHTML = rows.map((row, index) => buildDraftRow(row, index)).join("");
      }
      if (draftTableBody) {
        draftTableBody.innerHTML = "";
      }
    }

    function resetLab() {
      if (ocrFile) ocrFile.value = "";
      if (inlinePreview) inlinePreview.innerHTML = "";
      if (ocrStatus) {
        ocrStatus.textContent = "Waiting for a scanned file.";
      }
      if (reviewTableBody) {
        reviewTableBody.innerHTML = "";
      }
      if (draftTableBody) {
        draftTableBody.innerHTML = "";
      }
    }

    function startAnalysis() {
      if (!ocrFile || !ocrFile.files || !ocrFile.files[0]) {
        ocrStatus.textContent = "Please choose a scanned file or PDF first.";
        return;
      }

      const file = ocrFile.files[0];
      const selectedType = registerTypeSelect ? registerTypeSelect.value : "auto";

      
if (reviewTableBody) reviewTableBody.innerHTML = "";
renderSimulatedRows(selectedType);

setTimeout(() => {
  const table = document.getElementById("reviewTable");
  if (table) table.scrollIntoView({ behavior: "smooth", block: "start" });
}, 150);


      ocrStatus.textContent =
        "File loaded (" + file.name + "). Register type: " + selectedType +
        ". Simulated draft rows have been populated for review. Real OCR extraction will replace this step later.";
    }

    if (analyzeBtn) analyzeBtn.addEventListener("click", startAnalysis);
    if (previewScanBtn) previewScanBtn.addEventListener("click", function () {
      const file = ocrFile.files && ocrFile.files[0];
      if (!file) {
        ocrStatus.textContent = "Please choose a PDF or image first.";
        return;
      }
      const objectUrl = URL.createObjectURL(file);
      if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
        inlinePreview.innerHTML = '<iframe src="' + objectUrl + '" style="width:100%; height:100%; border:0;"></iframe>';
      } else {
        inlinePreview.innerHTML = '<div style="padding:12px; height:100%; box-sizing:border-box;"><img src="' + objectUrl + '" alt="Scan preview" style="max-width:100%; width:100%; height:auto; display:block; border-radius:10px;" /></div>';
      }
      ocrStatus.textContent = "Preview loaded.";
    });


function toggleLabInfo() {
  const sections = document.querySelectorAll(".lab-section");
  sections.forEach(function(el) {
    el.classList.toggle("lab-hidden");
  });
}

</script>
</body>
</html>
