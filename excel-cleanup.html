<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Cleanup</title>

  <link rel="stylesheet" href="css/base.css?v=9" />
  <link rel="stylesheet" href="css/layout.css?v=9" />
  <link rel="stylesheet" href="css/modules.css?v=9" />
  <link rel="stylesheet" href="css/forms.css?v=9" />
  <link rel="stylesheet" href="css/tables.css?v=9" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="appHeader"></div>

  <div class="shell">
    <div id="appSidebar"></div>

    <main class="app-main">
      <div class="page-title">Excel Cleanup</div>

      <section class="module-card" style="margin-bottom:20px;">
        <h3>Upload Excel File</h3>

        <div class="cleanup-toolbar cleanup-toolbar-main">
          <div class="cleanup-file-wrap">
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" />
            <div id="fileNameText" class="cleanup-file-name">No file chosen</div>
          </div>

          <button id="processBtn" class="primary-btn cleanup-btn" type="button">Load Workbook</button>

          <div class="cleanup-select-wrap">
            <select id="sheetSelect" class="sheet-select">
              <option value="">Select sheet</option>
            </select>
          </div>

          <div class="cleanup-select-wrap">
            <select id="ruleSelect" class="sheet-select">
              <option value="auto">Auto detect</option>
              <option value="training_register">Training Register</option>
              <option value="generic">Generic workbook</option>
            </select>
          </div>

          <button id="exportBtn" class="secondary-btn cleanup-btn" type="button">Export Cleaned Excel</button>
        </div>

        <div class="cleanup-toolbar cleanup-toolbar-meta">
          <label class="toggle-chip">
            <input type="checkbox" id="duplicatesOnlyToggle" />
            <span>Show duplicates only</span>
          </label>

          <label class="toggle-chip">
            <input type="checkbox" id="hideRemovedToggle" checked />
            <span>Hide removed rows</span>
          </label>

          <div id="ruleBadge" class="rule-chip">Rule: not selected</div>
        </div>
      </section>

      <section class="module-card" style="margin-bottom:20px;">
        <h3>Status</h3>
        <div id="statusText">No file processed yet</div>
      </section>

      <section class="module-card">
        <div class="section-head">
          <h3>Captured Data Review</h3>
          <div id="summaryText" class="summary-text">No rows loaded</div>
        </div>

        <div class="table-wrap">
          <table id="dataTable" class="data-table">
            <thead></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/guard.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/excel-cleanup.js?v=9"></script>
</body>
</html>
