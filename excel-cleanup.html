<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Cleanup</title>

  <link rel="stylesheet" href="css/base.css?v=9" />
  <link rel="stylesheet" href="css/layout.css?v=9" />
  <link rel="stylesheet" href="css/modules.css?v=9" />
  <link rel="stylesheet" href="css/forms.css?v=9" />
  <link rel="stylesheet" href="css/tables.css?v=9" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="appHeader"></div>

  <div class="shell">
    <div id="appSidebar"></div>

    <main class="app-main">
      <div class="page-title">Excel Cleanup</div>

      <section class="module-card cleanup-panel" style="margin-bottom:20px;">
        <h3>Upload Excel File</h3>

        <div class="cleanup-row cleanup-file-row">
          <div class="cleanup-file-wrap">
            <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" />
            <span id="fileNameText" class="cleanup-file-name">No file chosen</span>
          </div>

          <button id="processBtn" class="primary-btn cleanup-action-btn" type="button">Load Workbook</button>

          <select id="sheetSelect" class="sheet-select cleanup-select">
            <option value="">Select sheet</option>
          </select>

          <select id="ruleSelect" class="sheet-select cleanup-select">
            <option value="auto">Auto detect</option>
            <option value="training_register">Training Register</option>
            <option value="generic">Generic workbook</option>
          </select>
        </div>

        <div class="cleanup-row cleanup-action-row">
          <button id="saveDraftBtn" class="secondary-btn cleanup-action-btn compact-action-btn" type="button">Save Draft</button>
          <button id="restoreDraftBtn" class="secondary-btn cleanup-action-btn compact-action-btn" type="button">Restore Draft</button>
          <button id="exportBtn" class="secondary-btn cleanup-action-btn compact-action-btn" type="button">Export Cleaned Excel</button>
        </div>

        <div class="cleanup-row cleanup-filter-row">

<label class="toggle-chip">
  <input type="checkbox" id="riskOnlyToggle" />
  <span>Show risk only</span>
</label>

          <label class="toggle-chip">
            <input type="checkbox" id="duplicatesOnlyToggle" />
            <span>Show duplicates only</span>
          </label>

          <label class="toggle-chip">
            <input type="checkbox" id="hideRemovedToggle" checked />
            <span>Hide removed rows</span>
          </label>

          <div id="ruleBadge" class="rule-chip">Rule: not selected</div>
        </div>
      </section>

      <section class="module-card" style="margin-bottom:20px;">
        <h3>Status</h3>
        <div id="statusText">No file processed yet</div>
      </section>

      <section class="module-card review-card">
        <div class="section-head review-head">
          <div>
            <h3>Captured Data Review</h3>
            <div id="summaryText" class="summary-text">No rows loaded</div>
          </div>

          <button id="expandReviewBtn" class="secondary-btn cleanup-action-btn compact-action-btn" type="button">Expand Review</button>
        </div>

        <div class="review-scroll-shell">
          <div class="table-wrap">
            <table id="dataTable" class="data-table">
              <thead></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/guard.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/excel-cleanup.js?v=9"></script>


<!-- EXPAND REVIEW OVERLAY -->
<div id="reviewOverlay" class="review-overlay" style="display:none;">
  <div class="review-overlay-inner">

    <div class="review-overlay-header">
      <h3>Full Review</h3>
      <button id="closeReviewBtn" class="secondary-btn">Close</button>
    </div>

    <div id="reviewOverlayBody" class="review-overlay-body"></div>

  </div>
</div>

  <script src="js/review-overlay.js"></script>
</body>
</html>
